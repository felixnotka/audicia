---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: audiciapolicies.audicia.io
spec:
  group: audicia.io
  names:
    kind: AudiciaPolicy
    listKind: AudiciaPolicyList
    plural: audiciapolicies
    shortNames:
    - apolicy
    singular: audiciapolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.subject.name
      name: Subject
      type: string
    - jsonPath: .spec.subject.kind
      name: Kind
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.ruleCount
      name: Rules
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AudiciaPolicy contains the suggested RBAC manifests for a single subject,
          with an approval workflow for applying them to the cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AudiciaPolicySpec defines the suggested RBAC policy for a
              subject.
            properties:
              manifests:
                description: |-
                  Manifests is a list of rendered YAML strings, each containing a complete
                  Role, ClusterRole, RoleBinding, or ClusterRoleBinding manifest.
                items:
                  type: string
                type: array
              sourceRef:
                description: SourceRef is the name of the AudiciaSource that generated
                  this policy.
                minLength: 1
                type: string
              subject:
                description: Subject identifies who this policy is for.
                properties:
                  kind:
                    description: Kind is the type of subject (ServiceAccount, User,
                      or Group).
                    enum:
                    - ServiceAccount
                    - User
                    - Group
                    type: string
                  name:
                    description: Name is the name of the subject.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the namespace of the subject (only for
                      ServiceAccount).
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - manifests
            - sourceRef
            - subject
            type: object
          status:
            description: AudiciaPolicyStatus contains the approval state and metadata.
            properties:
              approvedBy:
                description: ApprovedBy is the identity of the user who approved this
                  policy.
                type: string
              approvedTime:
                description: ApprovedTime is when this policy was approved.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the policy's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              ruleCount:
                description: RuleCount is the number of RBAC rules in the suggested
                  manifests.
                format: int32
                type: integer
              state:
                default: Pending
                description: State is the lifecycle state of this policy.
                enum:
                - Pending
                - Approved
                - Applied
                - Outdated
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
